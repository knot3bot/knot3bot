version: '3.8'

services:
  knot3bot:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - BAILIAN_API_KEY=${BAILIAN_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - VOLCANO_API_KEY=${VOLCANO_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TENCENT_API_KEY=${TENCENT_API_KEY:-}
      - HERMES_WORKSPACE=/app/workspace
    command: ["--provider", "volcano-plan", "--server", "--port", "8080"]
    volumes:
      - knot3bot-data:/app/data
      - knot3bot-logs:/app/logs
      - ./workspace:/app/workspace:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  knot3bot-data:
    driver: local
  knot3bot-logs:
    driver: local
