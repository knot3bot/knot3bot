name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Linux builds ──────────────────────────────────────────────────────
  release-linux:
    name: ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux-musl
          - aarch64-linux-musl

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig (master)
        run: |
          ARCH=$(echo ${{ matrix.target }} | cut -d- -f1)
          ZIG_URL=$(curl -fsSL https://ziglang.org/download/index.json | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['master']['${ARCH}-linux']['tarball'])")
          echo "Downloading: $ZIG_URL"
          curl -fsSL "$ZIG_URL" -o /tmp/zig.tar.xz
          tar xf /tmp/zig.tar.xz -C /usr/local
          echo "/usr/local/$(tar tf /tmp/zig.tar.xz | head -1 | cut -d/ -f1)" >> $GITHUB_PATH

      - name: Build
        run: |
          zig build -Dtarget=${{ matrix.target }} -Drelease=true
          mkdir -p release
          cp zig-out/bin/knot3bot release/knot3bot-${{ matrix.target }}
          ls -lh release/

      - uses: actions/upload-artifact@v4
        with:
          name: knot3bot-${{ matrix.target }}
          path: release/*

  # ── macOS builds ──────────────────────────────────────────────────────
  release-macos:
    name: ${{ matrix.target }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-macos-gnu
          - aarch64-macos-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig (master)
        run: |
          ARCH=$(echo ${{ matrix.target }} | cut -d- -f1)
          ZIG_URL=$(curl -fsSL https://ziglang.org/download/index.json | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['master']['${ARCH}-macos']['tarball'])")
          echo "Downloading: $ZIG_URL"
          curl -fsSL "$ZIG_URL" -o /tmp/zig.tar.xz
          tar xf /tmp/zig.tar.xz -C /usr/local
          echo "/usr/local/$(tar tf /tmp/zig.tar.xz | head -1 | cut -d/ -f1)" >> $GITHUB_PATH

      - name: Build
        run: |
          zig build -Dtarget=${{ matrix.target }} -Drelease=true
          mkdir -p release
          cp zig-out/bin/knot3bot release/knot3bot-${{ matrix.target }}
          ls -lh release/

      - uses: actions/upload-artifact@v4
        with:
          name: knot3bot-${{ matrix.target }}
          path: release/*

  # ── GitHub Release ────────────────────────────────────────────────────
  create-release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    needs: [release-linux, release-macos]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker ─────────────────────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-24.04
    needs: [release-linux, release-macos]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest

  # ── npm ────────────────────────────────────────────────────────────────
  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-24.04
    needs: [create-release]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - run: |
          cd npm
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

      - run: |
          cd npm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
