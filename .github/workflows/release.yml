name: Release

on:
  push:
    tags:
      - 'v*'

env:
  ZIG_VERSION: "0.16.0"

jobs:
  # ── Linux builds (x86_64 + aarch64, musl) ──────────────────────────────
  release-linux:
    name: Release for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux-musl
          - aarch64-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        run: |
          curl -fsSL https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-linux-x86_64-${{ env.ZIG_VERSION }}.tar.xz | tar xJ -C /usr/local
          echo "/usr/local/zig-linux-x86_64-${{ env.ZIG_VERSION }}" >> $GITHUB_PATH

      - name: Cross-compile
        run: |
          TARGET=${{ matrix.target }}
          zig build -Dtarget=$TARGET -Drelease=true
          mkdir -p release/
          cp zig-out/bin/knot3bot release/knot3bot-${TARGET}
          ls -lh release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: knot3bot-${{ matrix.target }}
          path: release/*

  # ── macOS builds (x86_64 + aarch64) ────────────────────────────────────
  release-macos:
    name: Release for ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-macos-gnu
          - aarch64-macos-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        run: |
          curl -fsSL https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-macos-${{ matrix.target == 'aarch64-macos-gnu' && 'aarch64' || 'x86_64' }}-${{ env.ZIG_VERSION }}.tar.xz | tar xJ -C /usr/local
          echo "/usr/local/zig-macos-${{ matrix.target == 'aarch64-macos-gnu' && 'aarch64' || 'x86_64' }}-${{ env.ZIG_VERSION }}" >> $GITHUB_PATH

      - name: Compile
        run: |
          zig build -Dtarget=${{ matrix.target }} -Drelease=true
          mkdir -p release/
          cp zig-out/bin/knot3bot release/knot3bot-${{ matrix.target }}
          ls -lh release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: knot3bot-${{ matrix.target }}
          path: release/*

  # ── GitHub Release ─────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-linux, release-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker ──────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [release-linux, release-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest

  # ── npm ─────────────────────────────────────────────────────────────────
  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [create-release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update package version
        run: |
          cd npm
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

      - name: Publish to npm
        run: |
          cd npm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
