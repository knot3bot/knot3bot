name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  ZIG_VERSION: "0.15.2"

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig ${{ env.ZIG_VERSION }}
        uses: goto-bus-terminal/docker-ziglang@v1
        with:
          zig-version: ${{ env.ZIG_VERSION }}

      - name: Verify Zig version
        run: zig version

      - name: Build
        run: zig build

      - name: Run tests
        run: zig build test

      - name: Build release
        run: zig build -Drelease-safe
        if: matrix.os == 'ubuntu-latest'

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-terminal/docker-ziglang@v1
        with:
          zig-version: ${{ env.ZIG_VERSION }}

      - name: Run cache清洁
        run: |
          # Check for sensitive files that shouldn't be committed
          echo "Checking for sensitive files..."
          if git ls-files | grep -E "\.(env|credentials|pem|key)$" | grep -v ".env.example" | grep -v "docker-compose"; then
            echo "ERROR: Sensitive files found!"
            exit 1
          fi
          echo "No sensitive files found."

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
